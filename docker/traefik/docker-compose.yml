services:
  redis:
      image: redis:latest
      container_name: redis
      ports:
        - '6379:6379'
      volumes:
        - redis-data:/data/redis
      restart: unless-stopped
      networks:
        - traefik

  traefik:
    image: traefik:latest
    container_name: traefik
    pull_policy: always
    restart: unless-stopped
    labels:
      - "homepage.group=Core VM"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.${DOMAIN}/dashboard/"
      - "homepage.description=Reverse Proxy"
    command:
      - "--log.level=INFO"
      - "--api=true"
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--providers.redis.endpoints=redis:6379"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=127.0.0.1/8,192.168.1.0/24,172.16.0.0/12"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - traefik_certs:/certs
      - /run/user/1000/docker.sock:/var/run/docker.sock
    configs:
      - source: common
        target: /etc/traefik/dynamic/common.yml
      - source: authentik-middleware
        target: /etc/traefik/dynamic/authentik-middleware.yml
      - source: proxmox
        target: /etc/traefik/dynamic/proxmox.yml
      - source: traefik_dashboard
        target: /etc/traefik/dynamic/traefik-dashboard.yml
      - source: homeassistant
        target: /etc/traefik/dynamic/homeassistant.yml
    networks:
      - traefik

configs:
  common:
    content: |
      http:
        serversTransports:
          skip-verify:
            insecureSkipVerify: true
        middlewares:
          forwarded-proto:
            headers:
              customRequestHeaders:
                X-Forwarded-Proto: "https"
  proxmox:
    content: |
      http:
        routers:
          proxmox:
            rule: "Host(`proxmox.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: proxmox
            middlewares:
              - forwarded-proto
        services:
          proxmox:
            loadBalancer:
              serversTransport: skip-verify
              servers:
                - url: "${PROXMOX_URL}"
  homeassistant:
    content: |
      http:
        routers:
          homeassistant:
            rule: "Host(`homeassistant.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: homeassistant
        services:
          homeassistant:
            loadBalancer:
              servers:
                - url: "${HOMEASSISTANT_URL}"

  traefik_dashboard:
    content: |
      http:
        routers:
          traefik-dashboard:
            rule: "Host(`traefik.${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: api@internal
            middlewares:
              - authentik-forward-auth@file
              # - dashboard-auth
          traefik-dashboard-redirect:
            rule: "Host(`traefik.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: api@internal
            middlewares:
              - authentik-forward-auth@file
              - redirect-to-dashboard
        middlewares:
          dashboard-auth:
            basicAuth:
              users:
                - "${TRAEFIK_DASHBOARD_AUTH}"
          redirect-to-dashboard:
            redirectRegex:
              regex: "^https://traefik.${DOMAIN}/?$"
              replacement: "https://traefik.${DOMAIN}/dashboard/"
              permanent: true
    
  authentik-middleware:
    content: |
      http:
        middlewares:
          authentik-forward-auth:
            forwardAuth:
              address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
              trustForwardHeader: true
              authResponseHeaders:
                - X-authentik-username
                - X-authentik-groups
                - X-authentik-email
                - X-authentik-name
                - X-authentik-uid
                - X-authentik-jwt
                - X-authentik-meta-jwks
                - X-authentik-meta-outpost
                - X-authentik-meta-provider
                - X-authentik-meta-app
                - X-authentik-meta-version

volumes:
  traefik_certs:
  redis-data:

networks:
  traefik:
    external: true