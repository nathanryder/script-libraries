services:
  traefik:
    image: traefik:latest
    container_name: traefik
    pull_policy: always
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api=true"
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - traefik_certs:/certs
      - /run/user/1000/docker.sock:/var/run/docker.sock
    configs:
      - source: common
        target: /etc/traefik/dynamic/common.yml
      - source: proxmox
        target: /etc/traefik/dynamic/proxmox.yml
      - source: traefik_dashboard
        target: /etc/traefik/dynamic/traefik-dashboard.yml
      - source: homeassistant
        target: /etc/traefik/dynamic/homeassistant.yml
      - source: actualbudget
        target: /etc/traefik/dynamic/actualbudget.yml
    networks:
      - traefik

configs:
  common:
    content: |
      http:
        serversTransports:
          skip-verify:
            insecureSkipVerify: true
        middlewares:
          forwarded-proto:
            headers:
              customRequestHeaders:
                X-Forwarded-Proto: "https"
  proxmox:
    content: |
      http:
        routers:
          proxmox:
            rule: "Host(`proxmox.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: proxmox
            middlewares:
              - forwarded-proto
        services:
          proxmox:
            loadBalancer:
              serversTransport: skip-verify
              servers:
                - url: "${PROXMOX_URL}"
  homeassistant:
    content: |
      http:
        routers:
          homeassistant:
            rule: "Host(`homeassistant.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: homeassistant
        services:
          homeassistant:
            loadBalancer:
              servers:
                - url: "${HOMEASSISTANT_URL}"
  actualbudget:
    content: |
      http:
        routers:
          actualbudget:
            rule: "Host(`actualbudget.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: actualbudget
        services:
          actualbudget:
            loadBalancer:
              servers:
                - url: "${ACTUALBUDGET_URL}"

  traefik_dashboard:
    content: |
      http:
        routers:
          traefik-dashboard:
            rule: "Host(`traefik.${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: api@internal
            middlewares:
              - dashboard-auth
          traefik-dashboard-redirect:
            rule: "Host(`traefik.${DOMAIN}`)"
            entryPoints:
              - websecure
            tls:
              certResolver: letsencrypt
            service: api@internal
            middlewares:
              - redirect-to-dashboard
        middlewares:
          dashboard-auth:
            basicAuth:
              users:
                - "${TRAEFIK_DASHBOARD_AUTH}"
          redirect-to-dashboard:
            redirectRegex:
              regex: "^https://traefik.${DOMAIN}/?$"
              replacement: "https://traefik.${DOMAIN}/dashboard/"
              permanent: true

volumes:
  traefik_certs:

networks:
  traefik:
    external: true