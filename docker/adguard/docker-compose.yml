services:
  adguard:
    image: adguard/adguardhome:0.107.77
    container_name: adguard
    pull_policy: always
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    networks:
      - traefik
    labels:
      - "homepage.group=Core VM"
      - "homepage.name=AdGuard"
      - "homepage.icon=adguard-home.png"
      - "homepage.href=https://adguard.${DOMAIN}"
      - "homepage.description=DNS & Ad Blocking"
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`adguard.${DOMAIN}`)"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls.certresolver=letsencrypt"
      - "traefik.http.services.adguard.loadbalancer.server.port=80"
      - "traefik.http.routers.adguard.middlewares=authentik-forward-auth@file"

  adguard-exporter:
    image: ebrianne/adguard-exporter:v1.14
    container_name: adguard-exporter
    restart: unless-stopped
    ports:
      - "9617:9617"
    environment:
      - adguard_protocol=http
      - adguard_hostname=${ADGUARD_HOSTNAME}
      - adguard_port=8080
      - adguard_username=${ADGUARD_USERNAME}
      - adguard_password=${ADGUARD_PASSWORD}
    networks:
      - traefik

volumes:
  adguard_work:
  adguard_conf:

networks:
  traefik:
    external: true