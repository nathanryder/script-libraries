services:
  actual_server:
    image: docker.io/actualbudget/actual-server:26.5.2
    ports:
      - '5006:5006'
    volumes:
      - ./actualbudget:/data
    environment:
      - ACTUAL_OPENID_DISCOVERY_URL=https://auth.${DOMAIN}/application/o/actualbudget/.well-known/openid-configuration
      - ACTUAL_OPENID_CLIENT_ID=${ACTUAL_OPENID_CLIENT_ID}
      - ACTUAL_OPENID_CLIENT_SECRET=${ACTUAL_OPENID_CLIENT_SECRET}
      - ACTUAL_OPENID_SERVER_HOSTNAME=https://actualbudget.${DOMAIN}
      - ACTUAL_OPENID_AUTH_METHOD=openid
    labels:
      - "homepage.group=Services VM"
      - "homepage.name=Actual Budget"
      - "homepage.icon=actual-budget.png"
      - "homepage.href=https://actualbudget.${DOMAIN}"
      - "homepage.description=Budget Tracker"
      - "homepage.docker=services-vm"
      - "traefik.enable=true"
      - "traefik.http.routers.actual-budget.rule=Host(`actualbudget.${DOMAIN}`)"
      - "traefik.http.routers.actual-budget.entrypoints=websecure"
      - "traefik.http.routers.actual-budget.tls.certresolver=letsencrypt"
      - "traefik.http.services.actual-budget.loadbalancer.server.port=5006"
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped