services:
  timeline-app:
    image: ghcr.io/nathanryder/timeline-app:latest
    ports:
      - '8080:8080'
    environment:
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.timeline-app.rule=Host(`timeline.${DOMAIN}`)"
      - "traefik.http.routers.timeline-app.entrypoints=websecure"
      - "traefik.http.routers.timeline-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.timeline-app.loadbalancer.server.port=8080"
      - "homepage.group=Services VM"
      - "homepage.name=Timeline App"
      - "homepage.icon=timeline-app.png"
      - "homepage.href=https://timeline.${DOMAIN}"
      - "homepage.description="
      - "homepage.docker=services-vm"
    restart: unless-stopped
